name: Feature request
description: Propose a focused improvement within Lydra's local-first scope.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Product boundaries
      options:
        - label: This can remain local-first and requires no automatic Calendar booking.
          required: true
