name: Bug report
description: Report reproducible incorrect behavior without private data.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Lydra. Never include tokens, private Calendar data, or sensitive URLs.
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include expected behavior and safe reproduction steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lydra version
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options: [Chrome, Edge, Brave, Chromium, Other]
    validations:
      required: true
