name: Release candidate

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm package
        env:
          READSLOT_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.READSLOT_GOOGLE_OAUTH_CLIENT_ID }}
      - uses: actions/upload-artifact@v7
        with:
          name: readslot-release-candidate
          path: release/
          if-no-files-found: error
